name: CI

"on":
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show python info
        run: |
          python --version
          python -m pip --version
          python -c "import sys; print(sys.executable)"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip wheel

      - name: Install build + test deps
        run: |
          python -m pip install -e '.[dev]'
          # pyyaml comes via project deps; types-pyyaml + pandas-stubs via [dev]

      - name: Validate platform.yaml
        run: |
          python -c "import yaml; yaml.safe_load(open('platform.yaml')); print('platform.yaml: valid YAML')"

      - name: Ruff lint
        run: python -m ruff check src/ tests/

      - name: Ruff format check
        run: python -m ruff format --check src/ tests/

      - name: Mypy type-check
        run: python -m mypy

      - name: Pytest
        run: python -m pytest tests/ -v
