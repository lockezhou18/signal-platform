name: CI

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Ruff (lint)
        run: ruff check src/ tests/

      - name: Ruff (format check)
        run: ruff format --check src/ tests/

      - name: Mypy (type-check)
        run: mypy

      - name: Pytest
        run: pytest -v

      - name: Validate platform.yaml
        if: hashFiles('platform.yaml') != ''
        run: |
          pip install pyyaml jsonschema
          python -c "import yaml; yaml.safe_load(open('platform.yaml')); print('platform.yaml: valid YAML')"
